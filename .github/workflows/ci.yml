name: CI

on:
  pull_request:
    branches: [main]
  workflow_call:

env:
  DATABASE_URL: "postgresql://dummy:dummy@localhost:5432/dummy"
  ENCRYPTION_KEY: "abababababababababababababababababababababababababababababababababab"
  NEXTAUTH_SECRET: "ci-secret"
  GOOGLE_CLIENT_ID: "dummy"
  GOOGLE_CLIENT_SECRET: "dummy"
  OPENAI_API_KEY: "dummy"

jobs:
  lint-and-format:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "npm"

      - run: npm ci
      - run: npx prisma generate
      - run: npm run lint
      - run: npm run format:check

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: lint-and-format
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "npm"

      - run: npm ci
      - run: npx prisma generate
      - run: npm run build

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "npm"

      - run: npm ci
      - run: npx prisma generate
      - run: npm run test
