name: Deploy worker

on:
  push:
    branches: [main]

# Build the worker image once and push to GHCR. Fly.io is then redeployed
# with `flyctl deploy --image ghcr.io/<owner>/desgrava-worker:<sha>` so the
# exact same artifact runs on Fly and on any self-hosted box (`docker pull`
# the same tag).
#
# After the first successful run of this workflow, mark the GHCR package
# `desgrava-worker` as **public** in
# https://github.com/users/<owner>/packages/container/desgrava-worker/settings
# so Fly can pull without authenticating to GHCR. (The image contains no
# secrets — env vars are injected at runtime via Fly secrets.)

jobs:
  ci:
    uses: ./.github/workflows/ci.yml

  build-and-push:
    name: Build & push worker image to GHCR
    runs-on: ubuntu-latest
    needs: ci
    permissions:
      contents: read
      packages: write
    outputs:
      image: ${{ steps.image.outputs.image }}
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute lowercase image name
        id: image
        run: |
          owner_lc=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          echo "image=ghcr.io/${owner_lc}/desgrava-worker" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: worker/Dockerfile
          push: true
          tags: |
            ${{ steps.image.outputs.image }}:${{ github.sha }}
            ${{ steps.image.outputs.image }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-fly:
    name: Deploy worker to Fly.io
    runs-on: ubuntu-latest
    needs: build-and-push
    concurrency:
      group: deploy-worker-production
      cancel-in-progress: true
    steps:
      - uses: actions/checkout@v4

      - uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          flyctl deploy \
            --image "${{ needs.build-and-push.outputs.image }}:${{ github.sha }}" \
            --remote-only
